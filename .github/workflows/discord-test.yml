name: Woot Discord Test

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord test message
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          webhook_url = os.environ["DISCORD_WEBHOOK_URL"].strip()
          if not webhook_url:
              raise SystemExit("DISCORD_WEBHOOK_URL is empty")

          payload = json.dumps({
              "content": "Test from Woot Watcher: Discord webhook is connected.",
              "username": "Woot Watcher",
          }).encode("utf-8")

          req = urllib.request.Request(
              webhook_url,
              data=payload,
              headers={"Content-Type": "application/json", "User-Agent": "Woot Watcher Test"},
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              print(f"Discord test sent, status {resp.status}")
          PY
