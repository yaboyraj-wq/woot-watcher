name: Woot Restock Relaunch

on:
  workflow_run:
    workflows: ["Woot Restock Check"]
    types: [completed]

permissions:
  actions: write

jobs:
  relaunch:
    runs-on: ubuntu-latest
    steps:
      - name: Relaunch checker
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run check.yml --repo "${{ github.repository }}"
